<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Management Systems</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0C1F3F; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #142A50; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 48px; width: 100%; max-width: 400px; box-shadow: 0 12px 48px rgba(0,0,0,0.3); }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo h1 { color: #fff; font-size: 1.5rem; }
    .login-logo h1 span { color: #1D9E75; }
    .login-logo p { color: #A8B8D0; font-size: 0.85rem; margin-top: 8px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: #A8B8D0; font-size: 0.85rem; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 0.9rem; font-family: inherit; transition: all 0.3s; }
    .form-group input:focus { outline: none; border-color: #1D9E75; box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
    .btn-login { width: 100%; padding: 14px; background: #1D9E75; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-login:hover { background: #24b888; transform: translateY(-1px); }
    .error-msg { color: #ff5f57; font-size: 0.85rem; margin-top: 12px; text-align: center; display: none; }
    .back-link { display: block; text-align: center; margin-top: 20px; color: #A8B8D0; font-size: 0.85rem; text-decoration: none; }
    .back-link:hover { color: #1D9E75; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <h1>Management<span>Systems</span></h1>
      <p>Admin Panel</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@managementsystems.in" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-login">Login to Dashboard</button>
      <p class="error-msg" id="errorMsg"></p>
    </form>
    <a href="/" class="back-link">← Back to Website</a>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('errorMsg');
      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/admin/dashboard';
        } else {
          errEl.textContent = data.error;
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Connection error. Try again.';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
