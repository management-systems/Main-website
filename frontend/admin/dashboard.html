<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Management Systems</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <nav class="admin-nav">
    <h1>Management<span>Systems</span> — Admin</h1>
    <div class="admin-nav-right">
      <a href="/admin/dashboard" class="nav-link active">Dashboard</a>
      <a href="/admin/submissions" class="nav-link">Submissions</a>
      <a href="/admin/customers" class="nav-link">Customers</a>
      <a href="/admin/settings" class="nav-link">Settings</a>
      <a href="/admin/logout" class="btn-logout">Logout</a>
    </div>
  </nav>

  <div class="dashboard">
    <div class="stats-row">
      <div class="stat-card"><h3 id="totalSubmissions">0</h3><p>Total Submissions</p></div>
      <div class="stat-card"><h3 id="newSubmissions">0</h3><p>New / Unread</p></div>
      <div class="stat-card"><h3 id="totalCustomers">0</h3><p>Customers</p></div>
      <div class="stat-card"><h3 id="todayCount">0</h3><p>Today</p></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-header">
          <h2>📩 Recent Submissions</h2>
          <a href="/admin/submissions" class="link-sm">View All →</a>
        </div>
        <div id="recentSubmissions" class="list-compact"></div>
      </div>
      <div class="card">
        <div class="card-header">
          <h2>👥 Recent Customers</h2>
          <a href="/admin/customers" class="link-sm">View All →</a>
        </div>
        <div id="recentCustomers" class="list-compact"></div>
      </div>
    </div>
  </div>

  <div class="notification" id="notification"></div>

  <script>
    async function load() {
      const [subRes, custRes] = await Promise.all([
        fetch('/admin/api/submissions'),
        fetch('/admin/api/customers')
      ]);
      if (subRes.redirected) { window.location.href = '/admin'; return; }
      const submissions = await subRes.json();
      const customers = custRes.ok ? await custRes.json() : [];
      const today = new Date().toISOString().split('T')[0];

      document.getElementById('totalSubmissions').textContent = submissions.length;
      document.getElementById('newSubmissions').textContent = submissions.filter(s => !s.status || s.status === 'new').length;
      document.getElementById('totalCustomers').textContent = customers.length;
      document.getElementById('todayCount').textContent = submissions.filter(s => s.submittedAt?.startsWith(today)).length;

      const recentSub = document.getElementById('recentSubmissions');
      const recent = [...submissions].reverse().slice(0, 5);
      recentSub.innerHTML = recent.length ? recent.map((s, i) => `
        <a href="/admin/submissions/${submissions.indexOf(s)}" class="list-item">
          <div class="list-item-left">
            <strong>${s.name}</strong>
            <span>${s.service || 'General'}</span>
          </div>
          <div class="list-item-right">
            <span class="status-badge status-${s.status || 'new'}">${(s.status || 'new').toUpperCase()}</span>
            <span class="date-sm">${s.submittedAt ? new Date(s.submittedAt).toLocaleDateString() : ''}</span>
          </div>
        </a>
      `).join('') : '<p class="empty-sm">No submissions yet</p>';

      const recentCust = document.getElementById('recentCustomers');
      const recentC = [...customers].reverse().slice(0, 5);
      recentCust.innerHTML = recentC.length ? recentC.map((c, i) => `
        <a href="/admin/customers/${customers.indexOf(c)}" class="list-item">
          <div class="list-item-left">
            <strong>${c.name}</strong>
            <span>${c.email}</span>
          </div>
          <div class="list-item-right">
            <span class="date-sm">${c.convertedAt ? new Date(c.convertedAt).toLocaleDateString() : ''}</span>
          </div>
        </a>
      `).join('') : '<p class="empty-sm">No customers yet</p>';
    }
    load();
  </script>
</body>
</html>
