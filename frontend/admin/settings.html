<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <nav class="admin-nav">
    <h1>Management<span>Systems</span> — Admin</h1>
    <div class="admin-nav-right">
      <a href="/admin/dashboard" class="nav-link">Dashboard</a>
      <a href="/admin/submissions" class="nav-link">Submissions</a>
      <a href="/admin/customers" class="nav-link">Customers</a>
      <a href="/admin/settings" class="nav-link active">Settings</a>
      <a href="/admin/logout" class="btn-logout">Logout</a>
    </div>
  </nav>

  <div class="dashboard">
    <h2 style="color:#fff;margin-bottom:24px;">⚙️ Settings</h2>

    <div class="settings-grid">
      <div class="settings-card">
        <h2>📋 Site Details</h2>
        <div class="form-group"><label>Name</label><input type="text" id="detailName" placeholder="Person Name"></div>
        <div class="form-group"><label>Email</label><input type="email" id="detailEmail" placeholder="Email Address"></div>
        <div class="form-group"><label>Contact Number</label><input type="tel" id="detailPhone" placeholder="Phone Number"></div>
        <button class="btn btn-primary" onclick="saveDetails()">Save Details</button>
      </div>

      <div class="settings-card">
        <h2>🌟 Discounts</h2>
        <p style="font-size:0.8rem;color:#A8B8D0;margin-bottom:16px;">Set 0 to show no discount.</p>
        <div id="discountForm" style="max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;"></div>
        <button class="btn btn-primary" onclick="saveDiscounts()" style="margin-top:16px;">Save Discounts</button>
      </div>
    </div>
  </div>

  <div class="notification" id="notification"></div>

  <script>
    const DISCOUNT_ITEMS = [
      { key: 'starter', label: 'Starter Website (₹15,000)' },
      { key: 'professional', label: 'Professional Website (₹25,000)' },
      { key: 'advanced', label: 'Advanced Platform (₹40,000+)' },
      { key: 'maintenance_basic', label: 'Basic Maintenance (₹1,500/mo)' },
      { key: 'maintenance_professional', label: 'Professional Maintenance (₹3,000/mo)' },
      { key: 'maintenance_enterprise', label: 'Enterprise Maintenance (₹5,000+/mo)' },
      { key: 'addon_extra_page', label: 'Extra Page (₹2,000)' },
      { key: 'addon_admin_dashboard', label: 'Admin Dashboard (₹10,000)' },
      { key: 'addon_login_system', label: 'Login System (₹5,000)' },
      { key: 'addon_payment_gateway', label: 'Payment Gateway (₹8,000)' },
      { key: 'addon_seo', label: 'SEO Optimization (₹5,000)' },
      { key: 'addon_blog', label: 'Blog System (₹5,000)' },
      { key: 'addon_ecommerce', label: 'E-commerce (₹15,000)' },
      { key: 'addon_api', label: 'API Integration (₹5,000)' },
      { key: 'addon_database', label: 'Database Setup (₹5,000)' },
      { key: 'addon_redesign', label: 'Website Redesign (₹10,000)' },
      { key: 'addon_performance', label: 'Performance Opt. (₹5,000)' },
      { key: 'addon_migration', label: 'Data Migration (₹5,000)' }
    ];

    async function loadDetails() {
      const res = await fetch('/admin/api/details');
      if (res.ok) {
        const data = await res.json();
        document.getElementById('detailName').value = data.name || '';
        document.getElementById('detailEmail').value = data.email || '';
        document.getElementById('detailPhone').value = data.phone || '';
      }
    }

    async function saveDetails() {
      const res = await fetch('/admin/api/details', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('detailName').value,
          email: document.getElementById('detailEmail').value,
          phone: document.getElementById('detailPhone').value
        })
      });
      notify(res.ok ? 'Details saved!' : 'Failed');
    }

    async function loadDiscounts() {
      const res = await fetch('/admin/api/discounts');
      const data = res.ok ? await res.json() : {};
      document.getElementById('discountForm').innerHTML = DISCOUNT_ITEMS.map(item => `
        <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.02);padding:8px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);">
          <label style="flex:1;font-size:0.8rem;color:#A8B8D0;">${item.label}</label>
          <input type="number" id="disc_${item.key}" value="${data[item.key] || 0}" min="0" max="100" style="width:55px;padding:5px 6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#fff;font-size:0.8rem;text-align:center;">
          <span style="font-size:0.7rem;color:#A8B8D0;">%</span>
        </div>
      `).join('');
    }

    async function saveDiscounts() {
      const data = {};
      DISCOUNT_ITEMS.forEach(item => {
        data[item.key] = Math.min(100, Math.max(0, parseInt(document.getElementById('disc_' + item.key).value) || 0));
      });
      const res = await fetch('/admin/api/discounts', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      notify(res.ok ? 'Discounts saved!' : 'Failed');
    }

    function notify(msg) {
      const el = document.getElementById('notification');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    loadDetails();
    loadDiscounts();
  </script>
</body>
</html>
